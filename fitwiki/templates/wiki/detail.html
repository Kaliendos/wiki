{% extends 'base.html' %}
{% load wiki_extras %}
{% block title %}{{ article.title }}{% endblock %}


{% block 'content' %}
<div class="container mt-4">
    <!-- Заголовок статьи -->
    <h1 class="mb-4">{{ article.title }}</h1>

    <!-- Мета-информация -->
    <div class="text-muted mb-4">
        <span class="me-3">
            <i class="bi bi-person"></i> {{ article.author.username }}
        </span>
        <span class="me-3">
            <i class="bi bi-calendar"></i> {{ article.created_at|date:"d.m.Y" }}
        </span>
        <span>
            <i class="bi bi-eye"></i> {{ article.views }} просмотров
        </span>
    </div>
    <div class="article-content">
    {{ article.content|safe }}
</div>




</div>
{% endblock %}
