{% load static %}
<html lang="ru" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная страница</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Owl Carousel CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.theme.default.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
     <link rel="stylesheet" href="{% static 'css/main.css' %}">


</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">FitWiki</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Главная</a>
                    </li>
                     <li class="nav-item">
                        <a class="nav-link" href="/blog">Сообщество</a>
                    </li>
                       {% if user.is_authenticated %}
                     <li class="nav-item">
                        <span>{{ user.username }}!</span>
                          <form method="post" action="{% url 'logout' %}" style="display: inline;">
                    {% csrf_token %}
                              <button type="submit">Выйти</button></form>
                     </li>
                    {% else %}
                       <li class="nav-item">
                            <a href="{% url 'login' %}" style="color: white; text-decoration: none;">Войти</a>
                       </li>
                      <li class="nav-item">
                            <a href="{% url 'signup' %}"  style="color: white; text-decoration: none; padding: 2em;">Регистрация</a>
                       </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>



      <div class="container my-5">
    {% block 'content'%}

    {% endblock %}
      </div>


    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p>&copy;2026 FitWiki</p>
        </div>
    </footer>

</body>
